<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Log PHP</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#238636">
<style>
* { box-sizing: border-box; font-family: system-ui, sans-serif; }
body { margin: 0; padding: 16px; background: #f3f4f6; }
.card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
h1 { margin: 0 0 16px; font-size: 22px; color: #111827; }
label { display: block; margin: 12px 0 4px; font-weight: 600; color: #374151; }
input, select, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; }
button { width: 100%; margin-top: 16px; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; }
button:disabled { background: #9ca3af; }
#status { margin-top: 12px; text-align: center; font-size: 14px; padding: 8px; border-radius: 6px; }
.online { background: #d1fae5; color: #059669; }
.offline { background: #fee2e2; color: #dc2626; }
.msg { margin-top: 12px; text-align: center; font-size: 14px; }
.success { color: #059669; }
.error { color: #dc2626; }
</style>
</head>
<body>
<div class="card">
  <h2>JHOIE Log Trip</h2>
  
  <!-- Online/Offline Status -->
  <div id="status">Checking connection...</div>
  
  <form id="f">
    <label>Date <input name="date" type="date" required></label>
    <label>Trucking Code <input name="truck" placeholder="TT1" required></label>
    <label>Drop Off Area <input name="from" placeholder="Manila" required></label>
    <label>Cash Advance ₱ <input name="cash" type="number" step="0.01" placeholder="0" required></label>
    <label>Fuel ₱ <input name="fuel" type="number" step="0.01" placeholder="0" required></label>
    <label>Odometer <input name="odo" type="number" placeholder="km" required></label>
    <label>Notes <textarea name="notes" rows="2" placeholder="Day/Night" required></textarea></label>
    <button type="submit" id="btn">Save Trip</button>
  </form>

<!-- Auto GPS Section -->
<h3>Live GPS Tracker</h3>
<div>Status: <span id="gpsStatus">Off</span></div>
<button onclick="startGpsTracking()">Start GPS</button>
<button onclick="stopGpsTracking()">Stop GPS</button>

  <div id="msg" class="msg"></div>
</div>


<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js');
  });
}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzycV23RYJ_TvucWmOE7Kvnv3t9U6b-uPA2GUjCOGJ5gKPlnPA1ym4CM8LP_tz5m2al/exec';
const QUEUE_KEY = 'trip_queue';

// Set today's date
document.querySelector('[name="date"]').valueAsDate = new Date();

// Update online/offline status
function updateStatus() {
  const statusDiv = document.getElementById('status');
  if (navigator.onLine) {
    statusDiv.className = 'online';
    statusDiv.textContent = '● Online';
    syncQueue();
  } else {
    statusDiv.className = 'offline';
    statusDiv.textContent = '● Offline - will save locally';
  }
}
window.addEventListener('online', updateStatus);
window.addEventListener('offline', updateStatus);
updateStatus();

// Save to queue in localStorage
function saveOffline(data) {
  const queue = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
  queue.push(data);
  localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
}

// Sync queued items when online
async function syncQueue() {
  const queue = JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]');
  if (queue.length === 0) return;
  const msg = document.getElementById('msg');
  msg.textContent = `Syncing ${queue.length} offline trip(s)...`;
  for (let i = queue.length - 1; i >= 0; i--) {
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(queue[i])
      });
      queue.splice(i, 1);
    } catch (err) {
      break;
    }
  }
  localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
  if (queue.length === 0) {
    msg.textContent = 'All trips synced!';
    setTimeout(() => msg.textContent = '', 3000);
  } else {
    msg.textContent = `${queue.length} trip(s) still waiting to sync`;
  }
}

// Manual trip log submit
document.getElementById('f').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  const data = Object.fromEntries(new FormData(e.target).entries());
  data.sheet = 'trip_log'; // make sure it goes to trip_log tab
  const now = new Date();
  data.timestamp = now.toLocaleString('en-US', {
    month: '2-digit', day: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(data)
    });
    msg.className = 'msg success';
    msg.textContent = 'Trip saved. Salamat!';
    e.target.reset();
    document.querySelector('[name="date"]').valueAsDate = new Date();
  } catch(err) {
    saveOffline(data);
    msg.className = 'msg error';
    msg.textContent = 'Saved offline. Will sync when online.';
  }
  btn.disabled = false;
  btn.textContent = 'Save Trip';
};

// ===== GPS TRACKER - AUTO =====
let watchId = null;
let lastSentTime = 0;
const SEND_INTERVAL = 15000; // 15 sec

function startGpsTracking() {
  if (!navigator.geolocation) {
    document.getElementById('gpsStatus').innerText = 'GPS not supported';
    return;
  }
  
  document.getElementById('gpsStatus').innerText = 'GPS: Requesting permission...';
  
  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      const now = Date.now();
      document.getElementById('gpsStatus').innerText = 
        `Live: ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
      
      if (now - lastSentTime > SEND_INTERVAL) {
        lastSentTime = now;
        
        fetch(SCRIPT_URL, { // NOW USES CORRECT VARIABLE
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({
            sheet: 'location',
            timestamp: now,
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            accuracy: Math.round(pos.coords.accuracy),
            speed: pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(1) : 0,
            note: 'Auto Track'
          })
        }).catch(err => {
          document.getElementById('gpsStatus').innerText = 'Send error: ' + err;
        });
      }
    },
    (err) => {
      document.getElementById('gpsStatus').innerText = 'GPS Error: ' + err.message;
    },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
  );
}

function stopGpsTracking() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  document.getElementById('gpsStatus').innerText = 'GPS: Stopped';
}

// Auto-start GPS when page loads
window.addEventListener('load', startGpsTracking);
</script></body>
</html>
